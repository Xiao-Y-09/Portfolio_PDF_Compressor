# config.yaml — PDF 压缩 SaaS 配置模板
# ============================================================
# 安全约定：
#   - 本文件不含任何密钥。所有敏感字段留空，仅通过环境变量注入。
#   - 本地覆盖使用 config.local.yaml（已在 .gitignore 中，永不提交）。
# 数值来源：《PDF压缩SaaS构建手册.md》附录 B 关键常量参考表。
# ============================================================

# 环境变量覆盖规则（pydantic-settings，嵌套定界符 "__"）：
#   APP__APP_ENV / STORAGE__TMP_DIR / REDIS__HOST / AWS__S3_BUCKET ...

app:
  app_env: dev            # dev / prod（环境变量 APP__APP_ENV 可覆盖）
  log_level: INFO

storage:
  tmp_dir: ./tmp          # 临时工作区（处理完成后强制清理，铁律 5）
  retention_seconds: 300  # 临时文件保留时间（秒），铁律 5：≤ 5 分钟

redis:
  host: localhost         # 环境变量 REDIS__HOST 可覆盖
  port: 6379
  db: 0
  # 如需密码：在 settings.py 的 RedisConfig 增加 password 字段，
  # 通过环境变量 REDIS__PASSWORD 注入，禁止写入本文件。

compression:
  # ---- 三主控变量 ----
  aggressiveness: 0.5        # 默认压缩激进度（0.0 最保守 ~ 1.0 最激进）
  area_sensitivity: 0.6      # 小图 vs 大图差别待遇
  pixel_ceiling_ratio: 1.2   # 像素天花板安全余量

  # ---- 压缩场景预设 → aggressiveness 映射 ----
  # 2026-07-04 用户目视标定（DPI 对比实验 dpi_comparison/）：
  # medium(3.62MB) 与 conservative(3.84MB) 体积差仅 6%，无理由牺牲清晰度；
  # 5MB 是用户主动选择的极限压缩，画质损失可接受
  presets:
    print:
      aggressiveness: 0.2    # 20MB 打印档，最保守
    screen:
      aggressiveness: 0.3    # 10/15MB 日常档（对应 conservative 目视基准）
    email:
      aggressiveness: 0.8    # 5MB 极限档（对应 aggressive 目视基准）

  # ---- 位图参数边界 ----
  quality_floor: 50          # JPEG 质量绝对下限（2026-07-04 目视标定：aggressive 档底线）
  quality_ceiling: 95        # JPEG 质量绝对上限（100=无损，浪费）
  dpi_floor: 150             # DPI 绝对下限（2026-07-04 目视标定，72→150）
  dpi_ceiling: 300           # DPI 绝对上限

  # ---- 矢量策略阈值 ----
  vector_ignore_area_ratio: 0.1     # area_ratio 低于此值无条件 keep
  vector_simplify_threshold: 10000  # 控制点 ≥ 此值考虑 simplify
  vector_rasterize_threshold: 100000 # 控制点 ≥ 此值考虑 rasterize
  vector_bytes_per_control_point: 4.5 # 矢量输出成本估算系数（B/控制点）。
                                      # 2026-07-04 Phase 10 实测标定：portfolio_2 输出内容流
                                      # 3.76MB / 839k 重绘控制点 = 4.49 B/cp（初始估 3.0 偏差
                                      # +50% > 30% 阈值，按用户预授权更新）

  # ---- 收敛循环 ----
  max_convergence_rounds: 5         # binary search 最大轮数（铁律 7）
  convergence_tolerance: 0.15       # 达标容忍度（±15%）
  aggressiveness_step_large: 0.15   # 超标 >30% 时的单轮调整量
  aggressiveness_step_small: 0.08   # 超标 <30% 时的单轮调整量
  gap_large_threshold: 0.3          # "超标严重"判定线（§8.2）

  # ---- Phase 8 派生行为常量（2026-07-04 迁入 config，铁律：决策代码零裸数字）----
  area_tier_large: 0.6              # 大图阈值：容差/光栅化 DPI 分档界
  simplify_tolerance_conservative: 0.5   # simplify 容差（主图，几乎无感）
  simplify_tolerance_aggressive: 1.0     # simplify 容差（中图，轻微简化）
  rasterize_dpi_large: 200          # 光栅化 DPI（area_ratio > area_tier_large）
  rasterize_dpi_medium: 150         # 光栅化 DPI（0.3 ~ area_tier_large）
  rasterize_dpi_small: 96           # 光栅化 DPI（<0.3 档，被 §6.3 门槛封死，保留备用）
  vector_rasterize_min_area_ratio: 0.3   # 面积低于此值不允许 rasterize
  rasterize_estimate_quality: 80    # 光栅化体积估算用的 JPEG quality
  jpeg_bpp_base: 0.015              # JPEG 每像素字节估算：base + q/100 × coeff
  jpeg_bpp_quality_coeff: 0.105     # 2026-07-05 实测标定 0.04/0.12 → 0.015/0.105
                                    # （scripts/calibrate_jpeg_bpp.py，三样本 764 测量点；
                                    # 原系数在 q30-76 工作区间高估整页 49-76%/元素 17-34%，
                                    # 是 Tier 3 深度欠冲的直接根因，《压缩决策引擎.md》§5.5）
  png_bytes_per_pixel: 0.35         # PNG 每像素字节估算（无损经验均值）
  simplify_size_factor: 0.5         # simplify 后体积 ≈ 原始 × 此系数
  budget_overshoot_tolerance: 1.1   # 估算总和 > 预算 × 此值 → 触发再平衡
  # PNG 编码参数（质量优化 4，2026-07-04 实测扫描：12 张真透明图上
  # level≥6 体积零差别（261 vs 262KB）、optimize 无增益只费时 → 取最快组合）
  png_compress_level: 6
  png_optimize: false

  # ---- 分级压缩（Tier 系统，2026-07-04 产品决策，《压缩决策引擎.md》§8.5-8.7）----
  tier2_budget_margin: 0.9    # Tier 2 贪心选页停止线：下限总成本 ≤ target × 此值（留 10% 给位图）
  tier3_dpi_floor: 72         # Tier 3 独立 DPI 下限（Tier 1/2 是 150，目视标定值不受污染）
  tier3_quality_floor: 30     # Tier 3 独立 quality 下限（Tier 1/2 是 50）
  tier3_dpi_ceiling: 150      # Tier 3 DPI 上限 = Tier 1/2 的下限（语义闭合：Tier 3 最好 = Tier 1/2 最差）

classifier:
  # Phase 6 启发式分类阈值（迁入 config 决策：2026-07-04 用户批准）
  photo_area_threshold: 0.5          # raster 面积占比 > 此值 → photo_heavy 候选
  photo_min_dpi: 100                 # 且至少一张位图 dpi > 此值
  chart_vector_area_threshold: 0.3   # vector 面积占比 > 此值 → chart 候选
  chart_complexity_threshold: 5000   # 且控制点总数 > 此值
  chart_max_raster_ratio: 0.3        # 且 raster 占比 < 此值
  text_block_count_threshold: 15     # 文字块数 > 此值 → text_heavy 候选
  text_max_raster_ratio: 0.15        # 且 raster 占比 < 此值
  text_max_vector_complexity: 2000   # 且控制点总数 < 此值
  complexity_score_slope: 10.0       # 边界模糊度斜率：score = 1 - 距阈值距离 × slope

session:
  review_session_ttl: 1800   # 用户 review 会话超时（秒）

api:
  max_upload_mb: 500         # 上传大小上限
  cors_origins:
    - http://localhost:3000  # prod 部署时替换为前端域名

aws:
  # 可选：s3_bucket 留空则不启用 S3，使用本地存储。
  s3_bucket: ""              # 环境变量 AWS__S3_BUCKET 注入
  region: ""                 # 环境变量 AWS__REGION 注入
  # 密钥永不写入本文件：
  #   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY 仅通过环境变量或 IAM Role 注入。
