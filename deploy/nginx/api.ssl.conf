# 生产配置（手册 Phase 15 第四项；证书签出后 cp 为 active.conf 并 reload）：
# SSL 终结 + 大文件上传 + 长任务超时（架构设计 §6.2）
server {
    listen 80;
    server_name api.pdf.xiao-projects.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.pdf.xiao-projects.com;

    ssl_certificate     /etc/letsencrypt/live/api.pdf.xiao-projects.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pdf.xiao-projects.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 大文件上传（架构设计 §6.2：client_max_body_size 500M）
    client_max_body_size 500m;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长任务/大上传（架构设计 §6.2：proxy_read_timeout 300s）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}
